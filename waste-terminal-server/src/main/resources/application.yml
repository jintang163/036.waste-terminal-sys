server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: waste-terminal-server

  profiles:
    active: dev

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/waste_terminal?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,log4j2
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.waste.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true

# RocketMQ 配置
rocketmq:
  name-server: localhost:9876
  producer:
    group: waste-terminal-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: waste-files

# 国密配置
sm:
  sm2:
    public-key: 
    private-key: 
  sm4:
    key: 0123456789abcdeffedcba9876543210

# 系统配置
waste:
  storage-limit-days: 90
  warn-before-days: 7
  sync-batch-size: 100
  national-platform:
    url: https://api.ep.gov.cn/waste
    app-id: 
    app-secret: 
    mock-enabled: true
    connection-timeout: 10000
    read-timeout: 30000
    retry-times: 3 

# 日志配置
logging:
  level:
    com.waste: debug
    com.waste.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/waste-terminal.log
    max-size: 10MB
    max-history: 30

# 地磅网关配置
scale:
  gateway:
    port: 8899
    boss-threads: 1
    worker-threads: 8
    reader-idle-seconds: 30
    writer-idle-seconds: 0
    all-idle-seconds: 0
    heartbeat-threshold: 3
    mock-enabled: true
    mock-interval-seconds: 5

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
