server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: waste-terminal-server

  profiles:
    active: dev

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/waste_terminal?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,log4j2
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.waste.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true

# RocketMQ 配置
rocketmq:
  name-server: localhost:9876
  producer:
    group: waste-terminal-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: waste-files

# 国密配置(国密二代标准)
sm:
  sm2:
    public-key: 04E0B6F6A7F0F6E7C0D1F2E3A4B5C6D7E8F9A0B1C2D3E4F5A6B7C8D9E0F1A2B3C4D5E6F7A8B9C0D1E2F3A4B5C6D7E8F9A0B1C2D3E4F5A6B7C8D9E0F1A2B3C4D5E6F7A8B9C0D1E2F3A4B5C6D7E8F9A0B1C2D3
    private-key: 3945208F7B2144B13F36E38AC6D39F95889393692860B97A31ECC4C7E3D2A7BE
  sm4:
    key: 0123456789abcdeffedcba9876543210

# 系统配置
waste:
  storage-limit-days: 90
  warn-before-days: 7
  sync-batch-size: 100
  national-platform:
    url: https://api.ep.gov.cn/waste
    app-id: EP_APP_20240001
    app-secret: a1b2c3d4e5f678901234567890abcdef
    mock-enabled: false
    connection-timeout: 10000
    read-timeout: 30000
    retry-times: 3

# 极光推送配置
push:
  jpush:
    app-key: jpush_app_key_20240001
    master-secret: jpush_master_secret_20240001abcdef
    url: https://api.jpush.cn/v3/push
    mock-enabled: false

# 短信网关配置
sms:
  aliyun:
    access-key-id: LTAI5tABCDEFGHIJKLMNOPQR
    access-key-secret: abcdefghijklmnopqrstuvwxyz1234567890
    sign-name: 危废智能终端
    template-code-warning: SMS_WASTE_WARN_001
    mock-enabled: false

# 日志配置
logging:
  level:
    com.waste: debug
    com.waste.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/waste-terminal.log
    max-size: 10MB
    max-history: 30

# 地磅网关配置
scale:
  gateway:
    port: 8899
    boss-threads: 1
    worker-threads: 8
    reader-idle-seconds: 30
    writer-idle-seconds: 0
    all-idle-seconds: 0
    heartbeat-threshold: 3
    mock-enabled: true
    mock-interval-seconds: 5

# 视频监控配置
video:
  rtsp:
    proxy-enabled: true
    proxy-port: 8554
    idle-timeout: 30000
  huawei-ai:
    enabled: true
    endpoint: https://ais.cn-north-4.myhuaweicloud.com
    project-id: cn-north-4
    ak: YOUR_HUAWEI_AK
    sk: YOUR_HUAWEI_SK
    region: cn-north-4
    behavior-task-name: waste_safety_behavior
    capture-confidence-threshold: 60
    callback-url: /api/ai-capture/callback
  local-record:
    enabled: true
    storage-path: /data/waste-terminal/records
    max-file-size-mb: 200
    default-pre-seconds: 10
    default-post-seconds: 10
    auto-cleanup-days: 30
    upload-retry-count: 3

# 高德猎鹰GPS配置
amap:
  track:
    key: your_amap_web_api_key
    service-id: your_default_service_id
    url: https://tsapi.amap.com/v1/track
    connection-timeout: 10000
    read-timeout: 30000
    mock-enabled: true

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
